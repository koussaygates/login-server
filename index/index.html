<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — SecureApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c14;
      --surface: #0e1420;
      --border: #1c2840;
      --accent: #4f8eff;
      --accent2: #00e5b0;
      --danger: #ff4d6d;
      --text: #c8d8f0;
      --muted: #4a6080;
      --bright: #eef4ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ANIMATED GRID BACKGROUND */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(79,142,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,142,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridMove 20s linear infinite;
    }
    @keyframes gridMove { from{transform:translateY(0)} to{transform:translateY(48px)} }

    /* GLOW ORBS */
    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.12; pointer-events: none;
    }
    .orb1 { width:500px;height:500px;background:var(--accent);top:-150px;left:-150px; animation: orbFloat 12s ease-in-out infinite alternate; }
    .orb2 { width:400px;height:400px;background:var(--accent2);bottom:-100px;right:-100px; animation: orbFloat 15s ease-in-out infinite alternate-reverse; }
    @keyframes orbFloat { from{transform:translate(0,0)} to{transform:translate(40px,30px)} }

    /* MAIN CARD */
    .card {
      position: relative; z-index: 10;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 440px;
      padding: 48px 44px;
      box-shadow: 0 0 0 1px rgba(79,142,255,0.05), 0 32px 80px rgba(0,0,0,0.6);
      animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(24px) scale(0.97); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    /* TOP BADGE */
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(79,142,255,0.08); border: 1px solid rgba(79,142,255,0.2);
      border-radius: 20px; padding: 5px 14px; margin-bottom: 28px;
      font-size: 0.7rem; color: var(--accent); letter-spacing: 2px; text-transform: uppercase;
    }
    .badge-dot { width:6px;height:6px;background:var(--accent2);border-radius:50%;animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

    /* TITLE */
    .title {
      font-family: 'Syne', sans-serif;
      font-size: 2rem; font-weight: 800;
      color: var(--bright); line-height: 1.1;
      margin-bottom: 8px;
    }
    .title span { color: var(--accent); }
    .subtitle { font-size: 0.78rem; color: var(--muted); margin-bottom: 36px; }

    /* TABS */
    .tabs {
      display: flex; background: var(--bg);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 4px; margin-bottom: 28px; gap: 4px;
    }
    .tab {
      flex: 1; padding: 9px; text-align: center;
      font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 600;
      letter-spacing: 1px; cursor: pointer; border-radius: 6px;
      border: none; background: none; color: var(--muted);
      transition: all 0.25s;
    }
    .tab.active {
      background: var(--accent); color: #fff;
      box-shadow: 0 4px 16px rgba(79,142,255,0.3);
    }

    /* FORM */
    .form-group { margin-bottom: 18px; }
    label {
      display: block; font-size: 0.7rem; letter-spacing: 2px;
      color: var(--muted); margin-bottom: 8px; text-transform: uppercase;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 0.9rem; pointer-events: none;
    }
    input {
      width: 100%; background: var(--bg);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--bright); font-family: 'JetBrains Mono', monospace;
      font-size: 0.88rem; padding: 12px 14px 12px 40px;
      outline: none; transition: all 0.2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,142,255,0.1); }
    input::placeholder { color: var(--muted); }

    /* BUTTON */
    .btn {
      width: 100%; padding: 13px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700;
      letter-spacing: 1px; margin-top: 8px;
      transition: all 0.2s; position: relative; overflow: hidden;
    }
    .btn:hover { background: #6ba0ff; box-shadow: 0 8px 24px rgba(79,142,255,0.35); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-loader { display: none; }
    .btn.loading .btn-text { display: none; }
    .btn.loading .btn-loader { display: inline; }

    /* ALERT */
    .alert {
      border-radius: 8px; padding: 12px 16px;
      font-size: 0.78rem; line-height: 1.6; margin-bottom: 18px;
      display: none; border-left: 3px solid;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    .alert.show { display: block; }
    .alert-error   { background:rgba(255,77,109,0.08); border-color:var(--danger); color:var(--danger); }
    .alert-success { background:rgba(0,229,176,0.08); border-color:var(--accent2); color:var(--accent2); }

    /* DASHBOARD */
    #dashboard { display: none; animation: cardIn 0.4s ease both; }
    .dash-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px;
    }
    .dash-title { font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:800; color:var(--bright); }
    .logout-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; padding: 7px 14px;
      border-radius: 6px; cursor: pointer; letter-spacing: 1px; transition: all 0.2s;
    }
    .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

    .profile-card {
      background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 20px;
    }
    .profile-row { display:flex; justify-content:space-between; align-items:center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size:0.82rem; }
    .profile-row:last-child { border-bottom: none; }
    .profile-key { color: var(--muted); letter-spacing: 1px; font-size: 0.72rem; text-transform: uppercase; }
    .profile-val { color: var(--bright); }
    .role-badge {
      background: rgba(0,229,176,0.1); color: var(--accent2);
      padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; border: 1px solid rgba(0,229,176,0.2);
    }

    .token-box {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 14px; font-size: 0.7rem; color: var(--muted); word-break: break-all;
      line-height: 1.6; margin-bottom: 16px;
    }
    .token-label { color: var(--accent); font-size: 0.68rem; letter-spacing: 2px; margin-bottom: 8px; display:block; }

    .users-table { width:100%; border-collapse:collapse; font-size:0.78rem; margin-top:12px; }
    .users-table th { color:var(--muted); text-align:left; padding:8px 10px; border-bottom:1px solid var(--border); letter-spacing:1px; font-size:0.68rem; text-transform:uppercase; }
    .users-table td { padding:9px 10px; border-bottom:1px solid rgba(28,40,64,0.5); color:var(--text); }
    .users-table tr:hover td { background: rgba(79,142,255,0.03); }

    .section-title { font-family:'Syne',sans-serif; font-size:0.75rem; font-weight:700; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:12px; }

    /* SERVER URL config */
    .server-config {
      background: rgba(79,142,255,0.04); border: 1px solid rgba(79,142,255,0.15);
      border-radius: 8px; padding: 14px 16px; margin-bottom: 24px;
      display: flex; align-items: center; gap: 10px;
    }
    .server-config label { margin:0; white-space:nowrap; }
    .server-config input { padding: 6px 10px; flex:1; font-size:0.78rem; }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="card">

    <!-- LOGIN / REGISTER FORM -->
    <div id="auth-view">
      <div class="badge"><span class="badge-dot"></span> SecureApp v1.0</div>
      <div class="title">Welcome<br><span>Back.</span></div>
      <div class="subtitle">Connect to your Node.js backend server</div>

      <!-- SERVER URL -->
      <div class="server-config">
        <label>🔗 SERVER</label>
        <input type="text" id="server-url" value="https://mrlog.netlify.app/"/>
      </div>

      <!-- TABS -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">LOGIN</button>
        <button class="tab" onclick="switchTab('register')">REGISTER</button>
      </div>

      <!-- ALERT -->
      <div class="alert" id="alert"></div>

      <!-- LOGIN FORM -->
      <div id="login-form">
        <div class="form-group">
          <label>Username</label>
          <div class="input-wrap">
            <span class="input-icon">◈</span>
            <input type="text" id="login-user" placeholder="Enter username" autocomplete="off"/>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <span class="input-icon">◆</span>
            <input type="password" id="login-pass" placeholder="Enter password"/>
          </div>
        </div>
        <button class="btn" id="login-btn" onclick="doLogin()">
          <span class="btn-text">LOGIN →</span>
          <span class="btn-loader">CONNECTING...</span>
        </button>
      </div>

      <!-- REGISTER FORM -->
      <div id="register-form" style="display:none">
        <div class="form-group">
          <label>Username</label>
          <div class="input-wrap">
            <span class="input-icon">◈</span>
            <input type="text" id="reg-user" placeholder="Choose a username" autocomplete="off"/>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <span class="input-icon">◆</span>
            <input type="password" id="reg-pass" placeholder="Choose a password"/>
          </div>
        </div>
        <button class="btn" id="reg-btn" onclick="doRegister()">
          <span class="btn-text">CREATE ACCOUNT →</span>
          <span class="btn-loader">CREATING...</span>
        </button>
      </div>
    </div>

    <!-- DASHBOARD (after login) -->
    <div id="dashboard">
      <div class="dash-header">
        <div class="dash-title">Dashboard</div>
        <button class="logout-btn" onclick="doLogout()">LOGOUT ×</button>
      </div>

      <div class="section-title">Your Profile</div>
      <div class="profile-card">
        <div class="profile-row">
          <span class="profile-key">Username</span>
          <span class="profile-val" id="d-username">—</span>
        </div>
        <div class="profile-row">
          <span class="profile-key">User ID</span>
          <span class="profile-val" id="d-id">—</span>
        </div>
        <div class="profile-row">
          <span class="profile-key">Role</span>
          <span class="role-badge" id="d-role">—</span>
        </div>
      </div>

      <div class="section-title">JWT Token</div>
      <div class="token-box">
        <span class="token-label">BEARER TOKEN (copy this for API testing)</span>
        <span id="d-token">—</span>
      </div>

      <div class="section-title">All Users (from /api/users)</div>
      <div id="users-section">
        <table class="users-table">
          <thead><tr><th>#</th><th>Username</th><th>Role</th><th>Created</th></tr></thead>
          <tbody id="users-body"><tr><td colspan="4" style="color:var(--muted);padding:16px 10px;">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    let currentToken = null;

    function getServer() {
      return document.getElementById('server-url').value.replace(/\/$/, '');
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('login-form').style.display    = tab === 'login'    ? 'block' : 'none';
      document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
      hideAlert();
    }

    function showAlert(msg, type='error') {
      const a = document.getElementById('alert');
      a.className = `alert alert-${type} show`;
      a.textContent = msg;
    }
    function hideAlert() {
      document.getElementById('alert').classList.remove('show');
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.classList.toggle('loading', loading);
    }

    async function doLogin() {
      const username = document.getElementById('login-user').value.trim();
      const password = document.getElementById('login-pass').value;
      if (!username || !password) return showAlert('Please fill in all fields.');

      setLoading('login-btn', true);
      hideAlert();

      try {
        const res  = await fetch(`${getServer()}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (!res.ok) return showAlert(data.error || 'Login failed.');

        currentToken = data.token;
        showDashboard(data.token);
      } catch (e) {
        showAlert('Cannot reach server. Is it running? Check the server URL above.');
      } finally {
        setLoading('login-btn', false);
      }
    }

    async function doRegister() {
      const username = document.getElementById('reg-user').value.trim();
      const password = document.getElementById('reg-pass').value;
      if (!username || !password) return showAlert('Please fill in all fields.');

      setLoading('reg-btn', true);
      hideAlert();

      try {
        const res  = await fetch(`${getServer()}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (!res.ok) return showAlert(data.error || 'Registration failed.');
        showAlert(`Account created! You can now login.`, 'success');
      } catch (e) {
        showAlert('Cannot reach server. Is it running?');
      } finally {
        setLoading('reg-btn', false);
      }
    }

    function decodeJWT(token) {
      try {
        return JSON.parse(atob(token.split('.')[1]));
      } catch { return {}; }
    }

    async function showDashboard(token) {
      const payload = decodeJWT(token);

      document.getElementById('auth-view').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('d-username').textContent = payload.username || '—';
      document.getElementById('d-id').textContent       = payload.id || '—';
      document.getElementById('d-role').textContent     = payload.role || 'user';
      document.getElementById('d-token').textContent    = token;

      // Fetch all users
      try {
        const res  = await fetch(`${getServer()}/api/users`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();

        if (Array.isArray(data)) {
          document.getElementById('users-body').innerHTML = data.map(u => `
            <tr>
              <td>${u.id}</td>
              <td>${u.username}</td>
              <td><span style="color:var(--accent2)">${u.role}</span></td>
              <td style="color:var(--muted)">${new Date(u.created_at).toLocaleDateString()}</td>
            </tr>
          `).join('');
        } else {
          document.getElementById('users-body').innerHTML =
            `<tr><td colspan="4" style="color:var(--muted);padding:12px 10px;">${data.error || 'Could not load users'}</td></tr>`;
        }
      } catch {
        document.getElementById('users-body').innerHTML =
          `<tr><td colspan="4" style="color:var(--muted)">Failed to fetch users</td></tr>`;
      }
    }

    function doLogout() {
      currentToken = null;
      document.getElementById('dashboard').style.display  = 'none';
      document.getElementById('auth-view').style.display  = 'block';
      document.getElementById('login-user').value = '';
      document.getElementById('login-pass').value = '';
    }

    // Allow Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const loginForm = document.getElementById('login-form');
        const regForm   = document.getElementById('register-form');
        if (loginForm.style.display !== 'none') doLogin();
        else doRegister();
      }
    });
  </script>
</body>
</html>
